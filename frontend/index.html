<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Home Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

</head>

<body>

    <div class="container">

        <h1>🏠 Smart Home Dashboard</h1>

        <div id="status" class="status">
            🔴 MQTT Disconnected
        </div>

        <div class="card">

            <h2>💡 Kontrol Lampu</h2>

            <div class="button-group">

                <button class="btn-on"
                    onclick="kontrolLED('ON')">
                    ON
                </button>

                <button class="btn-off"
                    onclick="kontrolLED('OFF')">
                    OFF
                </button>

            </div>

        </div>

        <div class="card">

            <h2>🌀 Kontrol Kipas</h2>

            <div class="button-group">

                <button class="btn-on"
                    onclick="kontrolFan('ON')">
                    ON
                </button>

                <button class="btn-off"
                    onclick="kontrolFan('OFF')">
                    OFF
                </button>

            </div>

        </div>

        <div class="card">

            <h2>📊 Monitoring Sensor</h2>

            <div class="sensor-box">

        <div class="sensor-item">
            🌡️
            <br>
            Suhu
            <span id="suhu">0</span>
            °C
        </div>

        <div class="sensor-item">
            💧
            <br>
            Kelembaban
            <span id="lembab">0</span>
            %
    </div>

</div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
